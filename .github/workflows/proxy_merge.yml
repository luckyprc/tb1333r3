name: Proxy Pool Merge and Test

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 = 北京时间 10:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run proxy merge and test
        run: |
          cat << 'PYEOF' > merge_test.py
          import asyncio
          import base64
          import json
          import ssl
          import time
          import urllib.request
          import urllib.parse
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          # ---------- 配置 ----------
          TIMEOUT_TCP = 2      # TCP 超时 2 秒
          TIMEOUT_HTTP = 8     # HTTP 测试超时 8 秒
          MAX_DELAY_MS = 3000  # 延迟限制 3000ms
          CONCURRENCY = 500    # 并发限制 500
          FALLBACK_RETRIES = 1 # fallback 重试 1 次

          # 固定源地址（ghproxy 镜像）
          SOURCE_URL = "https://ghproxy.net/https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/trojan.txt"

          # 支持的所有协议
          ALL_PREFIXES = ("ss://", "trojan://", "vless://", "vmess://", "hysteria2://", "hy2://", "socks://", "socks5://", "ssr://")

          # ---------- 获取源内容 ----------
          def fetch_source(url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      raw = resp.read()
                      try:
                          text = raw.decode("utf-8", errors="strict")
                      except Exception:
                          text = raw.decode("utf-8", errors="ignore")

                      has_protocol = any(prefix in text for prefix in ALL_PREFIXES)

                      if has_protocol:
                          lines = [line.strip() for line in text.splitlines() if line.strip()]
                          print(f"[FETCH] {url} -> {len(lines)} nodes (plaintext)")
                          return lines

                      try:
                          decoded = base64.b64decode(raw).decode("utf-8", errors="ignore")
                          lines = [line.strip() for line in decoded.splitlines() if line.strip()]
                          print(f"[FETCH] {url} -> {len(lines)} nodes (base64 decoded)")
                          return lines
                      except Exception:
                          pass

                      print(f"[FETCH] {url} -> 0 nodes (unrecognized format)")
                      return []
              except Exception as e:
                  print(f"[ERROR] Fetch failed {url}: {e}")
                  return []

          # ---------- 解析节点 URL（返回 host, port, sni, use_tls） ----------
          def parse_node_url(node):
              try:
                  # 提取 query 参数
                  pure = node.split("#")[0]
                  if "?" in pure:
                      url_part, query_part = pure.split("?", 1)
                  else:
                      url_part, query_part = pure, ""
                  params = urllib.parse.parse_qs(query_part)
                  sni = params.get("sni", [None])[0] or params.get("host", [None])[0]
                  use_tls = any(params.get(k, [""])[0] in ("1", "true", "tls", "xtls", "reality") for k in ("security", "tls", "insecure", "allowInsecure"))

                  if node.startswith("ss://"):
                      body = node[5:]
                      if "@" in body:
                          before_at, after_at = body.split("@", 1)
                      else:
                          try:
                              decoded = base64.b64decode(body.split("#")[0].split("?")[0]).decode("utf-8", errors="ignore")
                              if "@" in decoded:
                                  before_at, after_at = decoded.split("@", 1)
                              else:
                                  return None
                          except Exception:
                              return None
                      after_at = after_at.split("#")[0].split("?")[0]
                      if ":" in after_at:
                          host, port_str = after_at.rsplit(":", 1)
                          return (host, int(port_str), sni, use_tls)

                  elif node.startswith("trojan://") or node.startswith("vless://"):
                      prefix_len = 9 if node.startswith("trojan://") else 8
                      body = node[prefix_len:]
                      if "@" in body:
                          _, after_at = body.split("@", 1)
                          after_at = after_at.split("#")[0].split("?")[0]
                          if ":" in after_at:
                              host, port_str = after_at.rsplit(":", 1)
                              return (host, int(port_str), sni, use_tls)

                  elif node.startswith("vmess://"):
                      body = node[8:].split("#")[0]
                      decoded = base64.b64decode(body).decode("utf-8", errors="ignore")
                      cfg = json.loads(decoded)
                      host = cfg.get("add", "")
                      port = int(cfg.get("port", 0))
                      vmess_sni = cfg.get("sni") or cfg.get("host") or host
                      vmess_tls = cfg.get("tls", "") in ("tls", "true", "1", "xtls", "reality")
                      return (host, port, vmess_sni, vmess_tls)

                  elif node.startswith("hysteria2://") or node.startswith("hy2://"):
                      prefix_len = 12 if node.startswith("hysteria2://") else 6
                      body = node[prefix_len:]
                      if "@" in body:
                          _, after_at = body.split("@", 1)
                          after_at = after_at.split("#")[0].split("?")[0]
                          if ":" in after_at:
                              host, port_str = after_at.rsplit(":", 1)
                              return (host, int(port_str), sni, True)  # hysteria2 默认走 TLS

                  elif node.startswith("socks://") or node.startswith("socks5://"):
                      if node.startswith("socks5://"):
                          body = node[9:]
                      else:
                          body = node[8:]
                      body = body.split("#")[0].split("?")[0]
                      if "@" in body:
                          _, after_at = body.split("@", 1)
                          body = after_at
                      if ":" in body:
                          host, port_str = body.rsplit(":", 1)
                          if host.startswith("["):
                              host = host[1:-1]
                          return (host, int(port_str), sni, use_tls)

                  elif node.startswith("ssr://"):
                      body = node[6:]
                      decoded = base64.b64decode(body).decode("utf-8", errors="ignore")
                      parts = decoded.split(":")
                      if len(parts) >= 2:
                          host = parts[0]
                          port_str = parts[1]
                          return (host, int(port_str), sni, use_tls)
              except Exception:
                  pass
              return None

          # ---------- TCP 测试 ----------
          async def tcp_test(host, port):
              try:
                  start = time.time()
                  reader, writer = await asyncio.wait_for(
                      asyncio.open_connection(host, port), timeout=TIMEOUT_TCP
                  )
                  writer.close()
                  await writer.wait_closed()
                  return int((time.time() - start) * 1000)
              except Exception:
                  return None

          # ---------- HTTP/TLS 测试（带 fallback，支持 SNI） ----------
          def parse_status_code(data):
              try:
                  first_line = data.split(b"\r\n")[0].decode("utf-8", errors="ignore")
                  parts = first_line.split()
                  if len(parts) >= 2:
                      return int(parts[1])
              except Exception:
                  pass
              return None

          async def _url_test_once(host, port, sni=None, use_tls=False):
              try:
                  start = time.time()
                  if use_tls or port in (443, 8443):
                      ctx = ssl.create_default_context()
                      ctx.check_hostname = False
                      ctx.verify_mode = ssl.CERT_NONE
                      server_name = sni or host
                      reader, writer = await asyncio.wait_for(
                          asyncio.open_connection(host, port, ssl=ctx, server_hostname=server_name),
                          timeout=TIMEOUT_HTTP
                      )
                  else:
                      reader, writer = await asyncio.wait_for(
                          asyncio.open_connection(host, port), timeout=TIMEOUT_HTTP
                      )

                  target_host = sni or host
                  req = (
                      b"GET /generate_204 HTTP/1.1\r\n"
                      + b"Host: " + target_host.encode() + b"\r\n"
                      + b"User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)\r\n"
                      + b"Connection: close\r\n\r\n"
                  )
                  writer.write(req)
                  await writer.drain()
                  data = await asyncio.wait_for(reader.read(1024), timeout=TIMEOUT_HTTP)
                  writer.close()
                  await writer.wait_closed()
                  if not data:
                      return None
                  code = parse_status_code(data)
                  if code is None or not (100 <= code <= 599):
                      return None
                  return int((time.time() - start) * 1000)
              except Exception:
                  return None

          async def url_test(host, port, sni=None, use_tls=False):
              delay = await _url_test_once(host, port, sni, use_tls)
              if delay is not None:
                  return delay
              for _ in range(FALLBACK_RETRIES):
                  await asyncio.sleep(0.5)
                  delay = await _url_test_once(host, port, sni, use_tls)
                  if delay is not None:
                      return delay
              return None

          # ---------- 处理单个节点 ----------
          async def process_node(node, semaphore):
              async with semaphore:
                  if not any(node.startswith(p) for p in ALL_PREFIXES):
                      return None

                  parsed = parse_node_url(node)
                  if not parsed:
                      return None
                  host, port, sni, use_tls = parsed

                  tcp_delay = await tcp_test(host, port)
                  if tcp_delay is None:
                      return None

                  url_delay = await url_test(host, port, sni, use_tls)
                  if url_delay is None:
                      return None

                  if url_delay > MAX_DELAY_MS:
                      return None
                  return {"node": node, "delay": url_delay, "host": host, "port": port}

          # ---------- 主函数 ----------
          async def main():
              print(f"[SOURCE] {SOURCE_URL}")
              nodes = await asyncio.to_thread(fetch_source, SOURCE_URL)

              seen = set()
              unique_nodes = [n for n in nodes if not (n in seen or seen.add(n))]
              print(f"[TOTAL] {len(unique_nodes)} unique nodes")

              semaphore = asyncio.Semaphore(CONCURRENCY)
              tasks = [process_node(n, semaphore) for n in unique_nodes]
              results = await asyncio.gather(*tasks)
              valid = [r for r in results if r is not None]
              valid.sort(key=lambda x: x["delay"])

              print(f"[VALID] {len(valid)} nodes after filtering (delay <= {MAX_DELAY_MS}ms)")

              with open("nodes.txt", "w", encoding="utf-8") as f:
                  f.write("\n".join([r["node"] for r in valid]))

              with open("nodes_summary.txt", "w", encoding="utf-8") as f:
                  f.write(f"Source: {SOURCE_URL}\n")
                  f.write(f"Total fetched: {len(nodes)}\n")
                  f.write(f"Unique: {len(unique_nodes)}\n")
                  f.write(f"Valid (delay <= {MAX_DELAY_MS}ms): {len(valid)}\n\n")
                  for r in valid[:50]:
                      f.write(f"{r['delay']}ms | {r['host']}:{r['port']} | {r['node'][:80]}...\n")

          asyncio.run(main())
          PYEOF
          python merge_test.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes.txt nodes_summary.txt
          git commit -m "Update proxies $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push
