name: Proxy Pool & PAC Generator (Real Forward + Google OK)

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PySocks

      - name: Fetch & Validate Proxies
        run: |
          mkdir -p output
          python3 << 'PYEOF'
          import requests, socket, socks, time, re, json, os, sys
          from urllib.parse import urlparse
          from concurrent.futures import ThreadPoolExecutor, as_completed

          # ========== 配置 ==========
          HTTPBIN_URL = "http://httpbin.org/ip"
          GOOGLE_URL = "http://www.google.com/generate_204"
          TCP_TIMEOUT = 2
          HTTP_TIMEOUT = 5
          GOOGLE_TIMEOUT = 4
          FETCH_TIMEOUT = 10
          MAX_LATENCY_MS = 5000
          MAX_WORKERS = 50
          TOP_N = 10
          MAX_HTTP = 3000
          MAX_SOCKS5 = 2000

          # ========== HTTP + SOCKS5 源 ==========
          SOURCES = [
              # HTTP
              ("https://raw.githubusercontent.com/saisuiu/Lionkings-Http-Proxys-Proxies/main/cnfree.txt", "http", False),
              ("https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt", "http", False),
              ("https://raw.githubusercontent.com/mmpx12/proxy-list/master/http.txt", "http", False),
              ("https://raw.githubusercontent.com/officialputuid/KangProxy/KangProxy/http/http.txt", "http", False),
              ("https://raw.githubusercontent.com/monosans/proxy-list/main/proxies/http.txt", "http", False),
              ("https://raw.githubusercontent.com/rdavydov/proxy-list/main/proxies/http.txt", "http", False),
              ("https://raw.githubusercontent.com/roosterkid/openproxylist/main/HTTPS_RAW.txt", "http", False),
              ("https://raw.githubusercontent.com/jetkai/proxy-list/main/online-proxies/txt/proxies-http.txt", "http", False),
              ("https://raw.githubusercontent.com/B4RC0DE-TM/proxy-list/main/HTTP.txt", "http", False),
              ("https://raw.githubusercontent.com/ObcbO/getproxy/master/file/http.txt", "http", False),
              # SOCKS5
              ("https://raw.githubusercontent.com/proxygenerator1/ProxyGenerator/main/MostStable/socks5.txt", "socks5", False),
              ("https://raw.githubusercontent.com/proxygenerator1/ProxyGenerator/main/Stable/socks5.txt", "socks5", False),
              ("https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt", "socks5", False),
              ("https://raw.githubusercontent.com/mmpx12/proxy-list/master/socks5.txt", "socks5", False),
              ("https://raw.githubusercontent.com/officialputuid/KangProxy/KangProxy/socks5/socks5.txt", "socks5", False),
              ("https://raw.githubusercontent.com/monosans/proxy-list/main/proxies/socks5.txt", "socks5", False),
              ("https://raw.githubusercontent.com/rdavydov/proxy-list/main/proxies/socks5.txt", "socks5", False),
          ]

          def log(msg):
              ts = time.strftime("%H:%M:%S")
              print("[{}] {}".format(ts, msg))
              sys.stdout.flush()

          def is_valid_port(port):
              try:
                  p = int(port)
                  return 1 <= p <= 65535
              except (ValueError, TypeError):
                  return False

          def parse_proxy_url(proxy_str):
              try:
                  parsed = urlparse(proxy_str)
                  host = parsed.hostname
                  port = parsed.port
                  if not host or not port or not is_valid_port(port):
                      return None
                  return host, port, parsed.scheme
              except Exception:
                  return None

          def fetch_one(url, default_proto):
              t0 = time.time()
              try:
                  r = requests.get(url, timeout=FETCH_TIMEOUT)
                  elapsed = time.time() - t0
                  if r.status_code != 200:
                      log("[FETCH] {} -> HTTP {} ({:.1f}s)".format(url.split("/")[-1], r.status_code, elapsed))
                      return []
                  text = r.text.strip()
                  if not text:
                      log("[FETCH] {} -> empty ({:.1f}s)".format(url.split("/")[-1], elapsed))
                      return []
                  
                  protocol = default_proto
                  ct = r.headers.get("content-type", "")
                  raw = []
                  
                  if "json" in ct or text.startswith("[") or text.startswith("{"):
                      try:
                          data = json.loads(text)
                          if isinstance(data, list):
                              for item in data:
                                  if isinstance(item, dict):
                                      proto = item.get("protocol", protocol)
                                      host = item.get("ip") or item.get("host")
                                      port = item.get("port")
                                      if host and is_valid_port(port):
                                          raw.append("{}://{}:{}".format(proto, host, port))
                                  elif isinstance(item, str) and re.match(r"[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+", item):
                                      raw.append("http://{}".format(item))
                          elif isinstance(data, dict):
                              for key in ["proxies", "data", "list"]:
                                  if key in data and isinstance(data[key], list):
                                      for p in data[key]:
                                          if isinstance(p, dict):
                                              proto = p.get("protocol", protocol)
                                              host = p.get("ip") or p.get("host")
                                              port = p.get("port")
                                              if host and is_valid_port(port):
                                                  raw.append("{}://{}:{}".format(proto, host, port))
                      except Exception as e:
                          log("[JSON_ERR] {}: {}".format(url.split("/")[-1], e))
                  else:
                      for line in text.splitlines():
                          line = line.strip()
                          if not line or line.startswith("#"):
                              continue
                          if re.match(r"^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]+$", line):
                              raw.append("{}://{}".format(protocol, line))
                          elif re.match(r"^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]+:.+:.+$", line):
                              parts = line.split(":")
                              if len(parts) >= 4:
                                  ip, port = parts[0], parts[1]
                                  if is_valid_port(port):
                                      raw.append("{}://{}:{}".format(protocol, ip, port))
                          elif re.match(r"^(http|https|socks4|socks5)://[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]+$", line):
                              raw.append(line)
                          else:
                              m = re.match(r"^([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}):([0-9]+)", line)
                              if m:
                                  if is_valid_port(m.group(2)):
                                      raw.append("{}://{}:{}".format(protocol, m.group(1), m.group(2)))
                  
                  log("[FETCH] {} -> {} proxies ({:.1f}s)".format(url.split("/")[-1], len(raw), elapsed))
                  return raw
              except Exception as e:
                  elapsed = time.time() - t0
                  log("[FETCH_ERR] {} -> {} ({:.1f}s)".format(url.split("/")[-1], str(e)[:50], elapsed))
                  return []

          def fetch_sources():
              raw = []
              log("[FETCH] Starting {} sources...".format(len(SOURCES)))
              for url, default_proto, required in SOURCES:
                  raw.extend(fetch_one(url, default_proto))
              
              seen = set()
              result = []
              for p in raw:
                  p_lower = p.lower()
                  if p_lower not in seen:
                      seen.add(p_lower)
                      result.append(p)
              
              http_list = [p for p in result if urlparse(p).scheme in ("http", "https")]
              socks_list = [p for p in result if urlparse(p).scheme == "socks5"]
              log("[FETCH] Total unique: {} HTTP | {} SOCKS5".format(len(http_list), len(socks_list)))
              return http_list, socks_list

          def tcp_check(host, port):
              try:
                  s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  s.settimeout(TCP_TIMEOUT)
                  t0 = time.time()
                  s.connect((host, int(port)))
                  lat = (time.time() - t0) * 1000
                  s.close()
                  return True, lat
              except Exception:
                  return False, 99999

          def forward_check(proxy_url):
              """验证代理是否真在转发（httpbin返回的exit_ip ≠ 代理ip）"""
              try:
                  proxies = {"http": proxy_url, "https": proxy_url}
                  t0 = time.time()
                  r = requests.get(HTTPBIN_URL, proxies=proxies, timeout=HTTP_TIMEOUT)
                  lat = (time.time() - t0) * 1000
                  
                  if r.status_code == 200 and "origin" in r.text:
                      try:
                          data = r.json()
                          returned_ip = data.get("origin", "").split(",")[0].strip()
                          proxy_ip = urlparse(proxy_url).hostname
                          
                          # 真转发：返回的IP和代理IP不同
                          if returned_ip and proxy_ip != returned_ip and lat <= MAX_LATENCY_MS:
                              return True, round(lat, 2), returned_ip
                      except Exception:
                          pass
                  return False, lat, None
              except Exception as e:
                  return False, 99999, None

          def google_check(proxy_url, scheme, host, port):
              """验证代理能否访问Google"""
              try:
                  if scheme == "socks5":
                      s = socks.socksocket()
                      s.set_proxy(socks.SOCKS5, host, int(port), rdns=True)
                      s.settimeout(GOOGLE_TIMEOUT)
                      s.connect(("www.google.com", 80))
                      req = b"GET /generate_204 HTTP/1.1\r\nHost: www.google.com\r\nConnection: close\r\n\r\n"
                      s.send(req)
                      data = s.recv(1024)
                      s.close()
                      if b"204" in data or b"HTTP/1.1 200" in data or b"HTTP/1.1 301" in data or b"HTTP/1.1 302" in data:
                          return True, 204
                      return False, 0
                  else:
                      proxies = {"http": proxy_url, "https": proxy_url}
                      r = requests.get(GOOGLE_URL, proxies=proxies, timeout=GOOGLE_TIMEOUT, allow_redirects=True)
                      if r.status_code in {200, 204, 301, 302}:
                          return True, r.status_code
                      return False, r.status_code
              except Exception as e:
                  return False, 0

          def validate_one(proxy_url):
              parsed = parse_proxy_url(proxy_url)
              if not parsed:
                  return None
              host, port, scheme = parsed
              
              # 1. TCP连通
              ok, _ = tcp_check(host, port)
              if not ok:
                  return None
              
              # 2. 验证真转发（httpbin）
              ok, lat, exit_ip = forward_check(proxy_url)
              if not ok:
                  return None
              
              # 3. 验证能访问Google
              ok, g_status = google_check(proxy_url, scheme, host, port)
              if not ok:
                  return None
              
              return {
                  "url": proxy_url,
                  "scheme": scheme,
                  "host": host,
                  "port": port,
                  "latency": lat,
                  "status": g_status,
                  "exit_ip": exit_ip
              }

          # ========== 主流程 ==========
          log("=" * 60)
          log("[Config] HTTP+SOCKS5 | Forward verify + Google OK")
          log("=" * 60)

          log("[1/3] Fetching proxy sources...")
          t_start = time.time()
          http_all, socks_all = fetch_sources()
          log("[1/3] Done in {:.1f}s".format(time.time() - t_start))

          def filter_and_cap(proxy_list, max_n, label):
              valid = []
              invalid = 0
              for p in proxy_list:
                  if parse_proxy_url(p):
                      valid.append(p)
                  else:
                      invalid += 1
              if invalid > 0:
                  log("[WARN] {} filtered {} invalid ports".format(label, invalid))
              capped = valid[:max_n]
              log("[1/3] {} valid: {} | capped at {}".format(label, len(valid), len(capped)))
              return capped

          http_candidates = filter_and_cap(http_all, MAX_HTTP, "HTTP")
          socks_candidates = filter_and_cap(socks_all, MAX_SOCKS5, "SOCKS5")
          candidates = http_candidates + socks_candidates
          log("[1/3] Total candidates: {}".format(len(candidates)))

          log("[2/3] TCP quick filter...")
          t_start = time.time()
          tcp_alive = []
          checked = 0
          with ThreadPoolExecutor(max_workers=MAX_WORKERS) as ex:
              futures = {}
              for p in candidates:
                  parsed = parse_proxy_url(p)
                  if parsed:
                      host, port, _ = parsed
                      futures[ex.submit(tcp_check, host, port)] = p
              for future in as_completed(futures):
                  p = futures[future]
                  ok, lat = future.result()
                  checked += 1
                  if ok:
                      tcp_alive.append(p)
                  if checked % 500 == 0:
                      log("[2/3] Progress: {}/{} TCP checked, {} passed".format(checked, len(candidates), len(tcp_alive)))
          log("[2/3] Done in {:.1f}s - TCP passed: {} / {}".format(time.time() - t_start, len(tcp_alive), len(candidates)))

          log("[3/3] Validating forward + Google ({} proxies)...".format(len(tcp_alive)))
          t_start = time.time()
          alive = []
          dead = 0
          checked = 0
          with ThreadPoolExecutor(max_workers=MAX_WORKERS) as ex:
              futures = {ex.submit(validate_one, p): p for p in tcp_alive}
              for future in as_completed(futures):
                  res = future.result()
                  checked += 1
                  if res:
                      alive.append(res)
                      if len(alive) <= 5:
                          log("[3/3] ALIVE {} | {}ms | {} {} | ExitIP: {}".format(
                              res["url"], res["latency"], res["scheme"].upper(),
                              res["status"], res["exit_ip"]
                          ))
                  else:
                      dead += 1
                  if checked % 200 == 0:
                      log("[3/3] Progress: {}/{} checked, {} alive".format(checked, len(tcp_alive), len(alive)))
          log("[3/3] Done in {:.1f}s - Alive: {} / Dead: {}".format(time.time() - t_start, len(alive), dead))

          alive.sort(key=lambda x: x["latency"])
          selected = alive[:TOP_N]
          log("Selected top {} real forward + Google-OK proxies".format(len(selected)))

          proxy_directives = []
          for item in selected:
              scheme = item["scheme"]
              host = item["host"]
              port = item["port"]
              if scheme == "socks5":
                  proxy_directives.append("SOCKS5 {}:{}".format(host, port))
              else:
                  proxy_directives.append("PROXY {}:{}".format(host, port))

          proxy_chain = "; ".join(proxy_directives) + "; DIRECT" if proxy_directives else "DIRECT"
          log("[PAC] Proxy chain: {}".format(proxy_chain[:200] + "..." if len(proxy_chain) > 200 else proxy_chain))

          blocked_domains = [
              "*.google.com", "*.googleapis.com", "*.googleusercontent.com",
              "*.gstatic.com", "*.youtube.com", "*.ytimg.com", "*.ggpht.com",
              "*.twitter.com", "*.x.com", "*.twimg.com",
              "*.facebook.com", "*.fbcdn.net", "*.fb.com",
              "*.instagram.com", "*.cdninstagram.com",
              "*.wikipedia.org", "*.wikimedia.org",
              "*.github.com", "*.githubusercontent.com", "*.githubassets.com",
              "*.medium.com", "*.reddit.com", "*.redd.it",
              "*.twitch.tv", "*.ttvnw.net",
              "*.chatgpt.com", "*.openai.com", "*.oaistatic.com",
              "*.claude.ai", "*.anthropic.com",
              "*.gmail.com", "*.bbc.com", "*.bbc.co.uk",
              "*.voachinese.com", "*.voa.gov",
              "*.dropbox.com", "*.dropboxusercontent.com",
              "*.archive.org", "*.cloudfront.net",
              "*.tiktok.com", "*.tiktokv.com",
              "*.telegram.org", "*.t.me",
              "*.linkedin.com", "*.licdn.com",
              "*.netflix.com", "*.nflxvideo.net",
              "*.quora.com", "*.pinterest.com", "*.tumblr.com",
              "*.soundcloud.com", "*.spotify.com",
              "*.nytimes.com", "*.washingtonpost.com", "*.reuters.com",
              "*.apnews.com", "*.dw.com", "*.rfa.org",
              "*.chinadigitaltimes.net", "*.greatfire.org",
              "*.signal.org", "*.wire.com"
          ]

          pac_lines = [
              'function FindProxyForURL(url, host) {',
              '    if (shExpMatch(host, "*.cn") ||',
              '        shExpMatch(host, "*.com.cn") ||',
              '        shExpMatch(host, "*.gov.cn") ||',
              '        shExpMatch(host, "*.edu.cn") ||',
              '        isInNet(host, "10.0.0.0", "255.0.0.0") ||',
              '        isInNet(host, "172.16.0.0", "255.240.0.0") ||',
              '        isInNet(host, "192.168.0.0", "255.255.0.0") ||',
              '        isInNet(host, "127.0.0.0", "255.255.255.0") ||',
              '        isPlainHostName(host)) {',
              '        return "DIRECT";',
              '    }',
              '',
              '    var blocked = ['
          ]
          for i, d in enumerate(blocked_domains):
              comma = "," if i < len(blocked_domains) - 1 else ""
              pac_lines.append('        "{}"{}'.format(d, comma))
          pac_lines.extend([
              '    ];',
              '    for (var i = 0; i < blocked.length; i++) {',
              '        if (shExpMatch(host, blocked[i])) {',
              '            return "{}";'.format(proxy_chain),
              '        }',
              '    }',
              '',
              '    return "DIRECT";',
              '}'
          ])
          pac_content = "\n".join(pac_lines)

          os.makedirs("output", exist_ok=True)
          with open("output/proxy.pac", "w", encoding="utf-8") as f:
              f.write(pac_content)

          with open("output/proxy_list.txt", "w", encoding="utf-8") as f:
              f.write("# Generated: {}\n".format(time.strftime("%Y-%m-%d %H:%M:%S")))
              f.write("# Mode: HTTP+SOCKS5 | Forward verify + Google OK\n")
              f.write("# TCP<<{}s | HTTP<<{}s | Google<<{}s | Latency<<{}ms\n".format(
                  TCP_TIMEOUT, HTTP_TIMEOUT, GOOGLE_TIMEOUT, MAX_LATENCY_MS
              ))
              f.write("-" * 60 + "\n")
              if selected:
                  for item in selected:
                      f.write("{} | {}ms | {} {} | ExitIP: {}\n".format(
                          item["url"], item["latency"], item["scheme"].upper(),
                          item["status"], item["exit_ip"]
                      ))
              else:
                  f.write("# WARNING: No usable proxies found.\n")

          html_parts = [
              '<!DOCTYPE html>',
              '<html>',
              '<head><meta charset="utf-8"><title>Proxy Pool Status</title>',
              '<style>',
              'body{font-family:monospace;max-width:900px;margin:40px auto;padding:20px}',
              'h1{border-bottom:2px solid #333}pre{background:#f4f4f4;padding:15px;overflow:auto}',
              '.ok{color:green}.warn{color:orange}.err{color:red}',
              'table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:8px;text-align:left}',
              'th{background:#eee}',
              '</style></head>',
              '<body>',
              '<h1>Proxy Pool Status</h1>',
          ]
          status_class = "ok" if selected else "err"
          status_text = "OK" if selected else "NO PROXY"
          html_parts.append('<p class="{}">Status: {}</p>'.format(status_class, status_text))
          html_parts.append('<p>Generated: {}</p>'.format(time.strftime("%Y-%m-%d %H:%M:%S")))
          html_parts.append('<p>Mode: <b>HTTP + SOCKS5 (Forward + Google OK)</b></p>')
          html_parts.append('<p>Fetched: {} HTTP + {} SOCKS5 | TCP: {} | Alive: {} | Selected: {}</p>'.format(
              len(http_candidates), len(socks_candidates), len(tcp_alive), len(alive), len(selected)
          ))
          html_parts.extend([
              '<h2>PAC URL</h2>',
              '<code>https://luckyprc.github.io/tb1333r3/proxy.pac</code>',
              '<h2>Selected Proxies</h2>',
              '<table>',
              '<tr><th>Proxy</th><th>Type</th><th>Latency</th><th>Status</th><th>Exit IP</th></tr>',
          ])
          if selected:
              for s in selected:
                  type_str = "SOCKS5" if s["scheme"] == "socks5" else "HTTP"
                  html_parts.append('<tr><td>{}</td><td>{}</td><td>{}ms</td><td>{}</td><td>{}</td></tr>'.format(
                      s["url"], type_str, s["latency"], s["status"], s["exit_ip"]
                  ))
          else:
              html_parts.append('<tr><td colspan=5>No usable proxies</td></tr>')
          html_parts.extend([
              '</table>',
              '<h2>Raw List</h2>',
              '<pre>',
          ])
          if selected:
              for s in selected:
                  type_str = "SOCKS5" if s["scheme"] == "socks5" else "HTTP"
                  html_parts.append('{} | {}ms | {} {} | ExitIP: {}'.format(
                      s["url"], s["latency"], type_str, s["status"], s["exit_ip"]
                  ))
          else:
              html_parts.append('No usable proxies')
          html_parts.extend([
              '</pre>',
              '</body></html>',
          ])
          html = "\n".join(html_parts)
          with open("output/index.html", "w", encoding="utf-8") as f:
              f.write(html)

          summary = "HTTP {}, SOCKS5 {}, TCP {}, Alive {}, Selected {}".format(
              len(http_candidates), len(socks_candidates), len(tcp_alive), len(alive), len(selected)
          )
          gh_out = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          with open(gh_out, "a") as fh:
              print("summary={}".format(summary), file=fh)

          log("[DONE] {}".format(summary))
          log("      Files written: output/proxy.pac, output/proxy_list.txt, output/index.html")
          log("=" * 60)
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
